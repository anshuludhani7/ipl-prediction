{% extends "base.html" %}

{% block title %}Login - IPL Prediction{% endblock %}

{% block content %}
<section class="card">
  <h1>Login</h1>
  <form method="post" action="/login" class="form-vertical">
    <label>
      Username
      <input
        type="text"
        name="username"
        placeholder="Username"
        required
      />
    </label>
    <label>
      PIN
      <input
        type="password"
        name="pin"
        placeholder="4-digit PIN"
        pattern="\\d{4}"
        maxlength="4"
        required
      />
    </label>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <button type="submit" class="btn-primary">Login</button>
  </form>
  <p class="hint">
    Users must be pre-created in the system. Usernames are case-insensitive.
  </p>
</section>
{% endblock %}
